services:
  # ─── C1 tier (high-end): 7 nodes ──────────────────────────────
  # On main machine.
  worker-c1-1:
    image: ubuntu:22.04
    container_name: worker-c1-1
    hostname: worker-c1-1
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "1.5"
    mem_limit: 2048m
    networks:
      - wsh-net

