services:
  # ─── C1 tier (high-end): 4 CPU, 4096 MB ───────────────────────
  # On main machine. Other tiers run on remote machines.
  worker-c1-1:
    image: ubuntu:22.04
    container_name: worker-c1-1
    hostname: worker-c1-1
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "4.0"
    mem_limit: 4096m
    networks:
      - wsh-net

  worker-c1-2:
    image: ubuntu:22.04
    container_name: worker-c1-2
    hostname: worker-c1-2
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "4.0"
    mem_limit: 4096m
    networks:
      - wsh-net

  worker-c1-3:
    image: ubuntu:22.04
    container_name: worker-c1-3
