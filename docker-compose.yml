    mem_limit: 2048m
    networks:
      - wsh-net
    profiles: ["single-machine"]

  worker-c2-3:
    image: ubuntu:22.04
    container_name: worker-c2-3
    hostname: worker-c2-3
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2048m
    networks:
      - wsh-net
    profiles: ["single-machine"]

  worker-c3-1:
    image: ubuntu:22.04
    container_name: worker-c3-1
    hostname: worker-c3-1
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
