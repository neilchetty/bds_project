    restart: unless-stopped
    cpus: "4.0"
    mem_limit: 4096m
    networks:
      - wsh-net

  # ─── For single-machine testing: all tiers on one PC ───────────
  worker-c2-1:
    image: ubuntu:22.04
    container_name: worker-c2-1
    hostname: worker-c2-1
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2048m
    networks:
      - wsh-net
    profiles: ["single-machine"]

  worker-c2-2:
    image: ubuntu:22.04
    container_name: worker-c2-2
    hostname: worker-c2-2
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
