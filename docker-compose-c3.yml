# Docker Compose for PC3 — C3 tier (baseline): 7 nodes
# Copy this file to PC3 and run: docker compose -f docker-compose-c3.yml up -d

services:
  worker-c3-1:
    image: ubuntu:22.04
    container_name: worker-c3-1
    hostname: worker-c3-1
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1024m

