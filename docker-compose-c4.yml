# Docker Compose for PC4 — C4 tier (low-end): 7 nodes
# Copy this file to PC4 and run: docker compose -f docker-compose-c4.yml up -d

services:
  worker-c4-1:
    image: ubuntu:22.04
    container_name: worker-c4-1
    hostname: worker-c4-1
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "0.5"
    mem_limit: 512m

