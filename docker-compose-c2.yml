# Docker Compose for PC2 — C2 tier (mid-range): 7 nodes
# Copy this file to PC2 and run: docker compose -f docker-compose-c2.yml up -d

services:
  worker-c2-1:
    image: ubuntu:22.04
    container_name: worker-c2-1
    hostname: worker-c2-1
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq coreutils > /dev/null 2>&1; sleep infinity"]
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2048m

